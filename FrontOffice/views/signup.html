  <script>
    function validateForm() {
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const role = document.getElementById('role').value;
      const terms = document.getElementById('termsCheck').checked;

      let errors = [];
      if (firstName.length < 2) errors.push('First name must be at least 2 characters.');
      if (lastName.length < 2) errors.push('Last name must be at least 2 characters.');
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errors.push('Invalid email.');
      if (password.length < 6) errors.push('Password must be at least 6 characters.');
      if (password !== confirmPassword) errors.push('Passwords do not match.');
      if (!['user', 'manager', 'manager recruiter'].includes(role)) errors.push('Invalid role.');
      if (!terms) errors.push('You must agree to the terms.');

      if (errors.length > 0) {
        alert(errors.join('\n'));
        return false;
      }
      return true;
    }

    function selectRole(role) {
      document.querySelectorAll('.role-tab').forEach(tab => tab.classList.remove('active'));
      document.querySelector(`.role-tab[data-role="${role}"]`).classList.add('active');
      document.getElementById('role').value = role;
    }
  </script>
